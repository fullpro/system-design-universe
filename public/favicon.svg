<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#06070c"/>

  <!-- Outer circle (universe boundary) -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>

  <!-- Central node -->
  <circle cx="50" cy="50" r="6" fill="#8b5cf6"/>

  <!-- Network nodes arranged in a distributed pattern -->
  <!-- Top -->
  <circle cx="50" cy="20" r="4" fill="#06b6d4"/>
  <line x1="50" y1="24" x2="50" y2="44" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Top-right -->
  <circle cx="72" cy="32" r="4" fill="#06b6d4"/>
  <line x1="66" y1="35" x2="56" y2="47" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Right -->
  <circle cx="80" cy="50" r="4" fill="#06b6d4"/>
  <line x1="74" y1="50" x2="56" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom-right -->
  <circle cx="72" cy="68" r="4" fill="#06b6d4"/>
  <line x1="66" y1="65" x2="56" y2="53" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom -->
  <circle cx="50" cy="80" r="4" fill="#06b6d4"/>
  <line x1="50" y1="76" x2="50" y2="56" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom-left -->
  <circle cx="28" cy="68" r="4" fill="#06b6d4"/>
  <line x1="34" y1="65" x2="44" y2="53" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Left -->
  <circle cx="20" cy="50" r="4" fill="#06b6d4"/>
  <line x1="26" y1="50" x2="44" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Top-left -->
  <circle cx="28" cy="32" r="4" fill="#06b6d4"/>
  <line x1="34" y1="35" x2="44" y2="47" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
</svg>
